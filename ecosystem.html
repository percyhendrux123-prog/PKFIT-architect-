<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Agent Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'DM Mono', monospace; color: #ccc; }
  canvas { display: block; }
  #header {
    position: absolute; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; background: rgba(10,10,15,0.85); border-bottom: 1px solid #222; z-index: 10;
  }
  #header h1 { font-family: 'Bebas Neue', sans-serif; color: #C8A96E; font-size: 28px; letter-spacing: 3px; }
  #send-btn {
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 18px;
    background: transparent; border: 1px solid #C8A96E; color: #C8A96E; cursor: pointer; transition: 0.2s;
  }
  #send-btn:hover { background: #C8A96E; color: #0a0a0f; }
  #info-panel {
    position: absolute; top: 52px; right: 0; width: 280px; bottom: 0;
    background: rgba(14,14,20,0.92); border-left: 1px solid #333; padding: 20px;
    transform: translateX(100%); transition: transform 0.3s ease; z-index: 10; overflow-y: auto;
  }
  #info-panel.open { transform: translateX(0); }
  #info-panel h2 { font-family: 'Bebas Neue', sans-serif; color: #C8A96E; font-size: 22px; margin-bottom: 8px; }
  #info-panel .close-btn {
    position: absolute; top: 12px; right: 12px; background: none; border: none;
    color: #888; font-size: 18px; cursor: pointer;
  }
  #info-panel .close-btn:hover { color: #fff; }
  #info-panel .field { margin-bottom: 12px; }
  #info-panel .field-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
  #info-panel .field-value { font-size: 13px; color: #ddd; }
  #info-panel .connections { font-size: 11px; color: #aaa; line-height: 1.6; }
  #presets {
    position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }
  .preset-btn {
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 14px;
    background: transparent; border: 1px solid #444; color: #ccc; cursor: pointer; transition: 0.2s; text-align: left;
  }
  .preset-btn:hover { border-color: #C8A96E; color: #C8A96E; }
  #legend {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; z-index: 10; font-size: 10px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  #controls-hint {
    position: absolute; bottom: 20px; right: 20px; font-size: 10px; color: #555; z-index: 10;
  }
  #tooltip {
    position: absolute; pointer-events: none; background: rgba(10,10,15,0.9); border: 1px solid #555;
    padding: 4px 10px; font-size: 11px; color: #eee; display: none; z-index: 20; white-space: nowrap;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
}}
</script>
</head>
<body>
<div id="header">
  <h1>LLM AGENT ECOSYSTEM</h1>
  <button id="send-btn">Send Prompt</button>
</div>
<div id="info-panel">
  <button class="close-btn" id="panel-close">&times;</button>
  <h2 id="panel-title">Node</h2>
  <div class="field"><div class="field-label">Role</div><div class="field-value" id="panel-role">-</div></div>
  <div class="field"><div class="field-label">State</div><div class="field-value" id="panel-state">-</div></div>
  <div class="field"><div class="field-label">Latency</div><div class="field-value" id="panel-latency">-</div></div>
  <div class="field"><div class="field-label">Incoming</div><div class="connections" id="panel-incoming">-</div></div>
  <div class="field"><div class="field-label">Outgoing</div><div class="connections" id="panel-outgoing">-</div></div>
</div>
<div id="presets">
  <button class="preset-btn" data-scenario="simple">&#9654; Simple Query</button>
  <button class="preset-btn" data-scenario="tool">&#9654; Tool-Heavy Task</button>
  <button class="preset-btn" data-scenario="multi">&#9654; Multi-Agent</button>
</div>
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4a90d9"></div>Idle</div>
  <div class="legend-item"><div class="legend-dot" style="background:#50c878"></div>Active</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div>Stressed</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d94040"></div>Failed</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div>Saturated</div>
</div>
<div id="controls-hint">Drag=Rotate&ensp;Scroll=Zoom&ensp;Click=Select</div>
<div id="tooltip"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const STATE_COLORS = {
  idle: 0x4a90d9, active: 0x50c878, stressed: 0xf5a623, failed: 0xd94040, saturated: 0x9b59b6
};

const NODES_DEF = [
  { id:'prompt_input', label:'Prompt Input', shape:'cone', role:'Entry point — user query arrives here', level:1, pos:[-8,0,-10], scale:1.0, latency:200 },
  { id:'system_prompt', label:'System Prompt', shape:'box', role:'Instructions/persona that shape agent behavior', level:1, pos:[-4,3,-8], scale:1.0, latency:100 },
  { id:'context_window', label:'Context Window', shape:'sphere_wire', role:'The token budget — everything flows through here', level:1, pos:[0,0,-4], scale:1.5, latency:300 },
  { id:'planning', label:'Planning', shape:'icosahedron', role:'Breaks task into steps, decides strategy', level:1, pos:[4,2,0], scale:1.0, latency:600 },
  { id:'reasoning', label:'Reasoning', shape:'icosahedron', role:'Chain-of-thought, analysis, decision-making', level:1, pos:[6,0,4], scale:1.0, latency:800 },
  { id:'memory_short', label:'Memory (Short)', shape:'sphere', role:'Conversation history, recent context', level:1, pos:[-6,4,2], scale:1.0, latency:200 },
  { id:'memory_long', label:'Memory (Long)', shape:'sphere', role:'RAG/vector store, persistent knowledge', level:1, pos:[-6,2,5], scale:1.0, latency:400 },
  { id:'tool_router', label:'Tool Router', shape:'octahedron', role:'Decides which tool to call', level:1, pos:[10,0,6], scale:1.0, latency:200 },
  { id:'tool_search', label:'Tool: Search', shape:'octahedron_sm', role:'Web/knowledge retrieval', level:1, pos:[14,2,4], scale:0.7, latency:700 },
  { id:'tool_code', label:'Tool: Code Exec', shape:'octahedron_sm', role:'Runs code, returns results', level:1, pos:[14,-2,6], scale:0.7, latency:900 },
  { id:'tool_api', label:'Tool: API Call', shape:'octahedron_sm', role:'External service integration', level:1, pos:[14,2,9], scale:0.7, latency:500 },
  { id:'tool_file', label:'Tool: File I/O', shape:'octahedron_sm', role:'Read/write files', level:1, pos:[14,-2,10], scale:0.7, latency:300 },
  { id:'output', label:'Output Generation', shape:'cone_inv', role:'Produces the final response', level:1, pos:[2,-2,10], scale:1.0, latency:500 },
  { id:'safety', label:'Safety / Guardrails', shape:'diamond', role:'Filters harmful content, enforces policies', level:1, pos:[0,-4,13], scale:1.0, latency:300 },
  { id:'feedback', label:'Feedback Loop', shape:'torus', role:'Output feeds back to memory + evaluation', level:1, pos:[-4,-2,12], scale:1.0, latency:200 },
  { id:'orchestrator', label:'Orchestrator', shape:'torus_lg', role:'Routes tasks to specialist agents', level:2, pos:[0,5,28], scale:1.3, latency:400 },
  { id:'agent_researcher', label:'Researcher Agent', shape:'sphere', role:'Gathers information', level:2, pos:[-12,3,30], scale:1.0, latency:800 },
  { id:'agent_coder', label:'Coder Agent', shape:'sphere', role:'Writes and reviews code', level:2, pos:[-8,-4,32], scale:1.0, latency:1000 },
  { id:'agent_reviewer', label:'Reviewer Agent', shape:'sphere', role:'Validates quality, checks errors', level:2, pos:[8,-4,32], scale:1.0, latency:600 },
  { id:'agent_planner', label:'Planner Agent', shape:'sphere', role:'High-level task decomposition', level:2, pos:[12,3,30], scale:1.0, latency:500 },
  { id:'message_bus', label:'Message Bus', shape:'cylinder', role:'Inter-agent communication channel', level:2, pos:[0,-2,34], scale:1.0, latency:150 },
  { id:'shared_memory', label:'Shared Memory', shape:'box_lg', role:'Common knowledge base all agents access', level:2, pos:[0,8,26], scale:1.0, latency:300 },
  { id:'task_queue', label:'Task Queue', shape:'cylinder', role:'Pending work items for agents', level:2, pos:[0,0,24], scale:1.0, latency:200 },
  { id:'human_loop', label:'Human-in-the-Loop', shape:'diamond', role:'Approval gates, user intervention points', level:2, pos:[16,4,26], scale:1.0, latency:1000 },
];

const EDGES_DEF = [
  ['prompt_input','context_window'],['system_prompt','context_window'],
  ['context_window','planning'],['planning','reasoning'],['reasoning','tool_router'],
  ['tool_router','tool_search'],['tool_router','tool_code'],['tool_router','tool_api'],['tool_router','tool_file'],
  ['tool_search','reasoning'],['tool_code','reasoning'],['tool_api','reasoning'],['tool_file','reasoning'],
  ['reasoning','output'],['output','safety'],['safety','feedback'],
  ['feedback','memory_short'],['feedback','memory_long'],
  ['memory_short','context_window'],['memory_long','context_window'],
  ['planning','memory_short'],['reasoning','memory_short'],
  ['output','orchestrator'],['memory_long','shared_memory'],['human_loop','safety'],
  ['orchestrator','task_queue'],
  ['task_queue','agent_researcher'],['task_queue','agent_coder'],['task_queue','agent_reviewer'],['task_queue','agent_planner'],
  ['agent_researcher','message_bus'],['agent_coder','message_bus'],['agent_reviewer','message_bus'],['agent_planner','message_bus'],
  ['message_bus','orchestrator'],['message_bus','shared_memory'],
  ['shared_memory','orchestrator'],['orchestrator','human_loop'],['human_loop','orchestrator'],
];

const SCENARIOS = {
  simple: [
    ['prompt_input','context_window'],['context_window','planning'],['planning','reasoning'],
    ['reasoning','output'],['output','safety'],['safety','feedback'],
    ['feedback','memory_short'],['memory_short','context_window']
  ],
  tool: [
    ['prompt_input','context_window'],['context_window','planning'],['planning','reasoning'],
    ['reasoning','tool_router'],
    ['tool_router','tool_search'],['tool_router','tool_code'],['tool_router','tool_api'],['tool_router','tool_file'],
    ['tool_search','reasoning'],['tool_code','reasoning'],['tool_api','reasoning'],['tool_file','reasoning'],
    ['reasoning','output'],['output','safety'],['safety','feedback'],
    ['feedback','memory_short'],['feedback','memory_long']
  ],
  multi: [
    ['prompt_input','context_window'],['context_window','planning'],['planning','reasoning'],
    ['reasoning','output'],['output','orchestrator'],['orchestrator','task_queue'],
    ['task_queue','agent_researcher'],['task_queue','agent_coder'],
    ['agent_researcher','message_bus'],['agent_coder','message_bus'],
    ['message_bus','shared_memory'],['message_bus','orchestrator'],
    ['orchestrator','human_loop'],['human_loop','orchestrator']
  ]
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 25, 55);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
let userInteracted = false;
renderer.domElement.addEventListener('pointerdown', () => {
  if (!userInteracted) { userInteracted = true; controls.autoRotate = false; }
}, { once: true });

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const pLight1 = new THREE.PointLight(0xffffff, 1.0); pLight1.position.set(0, 30, 0); scene.add(pLight1);
const pLight2 = new THREE.PointLight(0xffffff, 0.3); pLight2.position.set(20, -10, 20); scene.add(pLight2);

// Build geometry map
function makeGeometry(shape) {
  switch(shape) {
    case 'cone': return new THREE.ConeGeometry(0.8, 1.6, 8);
    case 'cone_inv': { const g = new THREE.ConeGeometry(0.8, 1.6, 8); g.rotateX(Math.PI); return g; }
    case 'box': return new THREE.BoxGeometry(1.2, 1.2, 1.2);
    case 'box_lg': return new THREE.BoxGeometry(1.8, 1.2, 1.8);
    case 'sphere': return new THREE.SphereGeometry(0.8, 16, 16);
    case 'sphere_wire': return new THREE.SphereGeometry(1.0, 16, 16);
    case 'icosahedron': return new THREE.IcosahedronGeometry(0.9);
    case 'octahedron': return new THREE.OctahedronGeometry(0.8);
    case 'octahedron_sm': return new THREE.OctahedronGeometry(0.6);
    case 'diamond': { const g = new THREE.OctahedronGeometry(0.8); g.scale(1, 1.6, 1); return g; }
    case 'torus': return new THREE.TorusGeometry(0.7, 0.25, 12, 24);
    case 'torus_lg': return new THREE.TorusGeometry(1.0, 0.3, 12, 24);
    case 'cylinder': return new THREE.CylinderGeometry(0.5, 0.5, 1.4, 12);
    default: return new THREE.SphereGeometry(0.8, 16, 16);
  }
}

// Create nodes
const nodes = {};
const nodeMeshes = [];
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

NODES_DEF.forEach((def, idx) => {
  const geom = makeGeometry(def.shape);
  const isWireframe = def.shape === 'sphere_wire';
  const mat = new THREE.MeshStandardMaterial({
    color: STATE_COLORS.idle, emissive: STATE_COLORS.idle, emissiveIntensity: 0.3,
    metalness: 0.3, roughness: 0.6, transparent: true, opacity: 0.85,
    wireframe: isWireframe
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(def.pos[0], def.pos[1], def.pos[2]);
  mesh.scale.setScalar(def.scale);
  nodeGroup.add(mesh);

  // Label
  const labelDiv = document.createElement('div');
  labelDiv.style.fontFamily = "'DM Mono', monospace";
  labelDiv.style.fontSize = '10px';
  labelDiv.style.color = '#ffffff';
  labelDiv.style.textShadow = '0 0 4px #000, 0 0 8px #000';
  labelDiv.style.pointerEvents = 'none';
  labelDiv.textContent = def.label;
  const labelObj = new CSS2DObject(labelDiv);
  labelObj.position.set(0, 1.4, 0);
  mesh.add(labelObj);

  const node = {
    ...def, mesh, index: idx, material: mat,
    state: 'idle', baseScale: def.scale,
    vx: 0, vy: 0, vz: 0
  };
  nodes[def.id] = node;
  nodeMeshes.push(mesh);
  mesh.userData = { nodeId: def.id };
});

// Create edges
const edges = [];
const edgeGroup = new THREE.Group();
scene.add(edgeGroup);

EDGES_DEF.forEach(([srcId, tgtId]) => {
  const src = nodes[srcId], tgt = nodes[tgtId];
  if (!src || !tgt) return;
  const points = [src.mesh.position.clone(), tgt.mesh.position.clone()];
  const geom = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0x333333 });
  const line = new THREE.Line(geom, mat);
  edgeGroup.add(line);

  // Arrowhead
  const arrowGeom = new THREE.ConeGeometry(0.15, 0.5, 6);
  const arrowMat = new THREE.MeshStandardMaterial({ color: 0x555555, emissive: 0x333333, emissiveIntensity: 0.2 });
  const arrow = new THREE.Mesh(arrowGeom, arrowMat);
  edgeGroup.add(arrow);

  const crossLevel = src.level !== tgt.level;
  edges.push({ srcId, tgtId, line, geom, mat, arrow, arrowMat, crossLevel, restLength: crossLevel ? 15 : 8 });
});

function updateEdgePositions() {
  const tmpDir = new THREE.Vector3();
  edges.forEach(e => {
    const sp = nodes[e.srcId].mesh.position;
    const tp = nodes[e.tgtId].mesh.position;
    const pos = e.geom.attributes.position;
    pos.setXYZ(0, sp.x, sp.y, sp.z);
    pos.setXYZ(1, tp.x, tp.y, tp.z);
    pos.needsUpdate = true;
    // Arrow at 80%
    e.arrow.position.lerpVectors(sp, tp, 0.8);
    tmpDir.subVectors(tp, sp).normalize();
    e.arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tmpDir);
  });
}

// Build adjacency for info panel
const incoming = {}, outgoing = {};
NODES_DEF.forEach(n => { incoming[n.id] = []; outgoing[n.id] = []; });
EDGES_DEF.forEach(([s, t]) => { outgoing[s].push(t); incoming[t].push(s); });

// Force-directed layout
let frameCount = 0;
let forceScale = 1.0;

function runForces() {
  frameCount++;
  if (frameCount > 300) forceScale *= 0.95;
  if (forceScale < 0.001) return;

  const nodeArr = Object.values(nodes);
  const n = nodeArr.length;

  // Repulsion
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const a = nodeArr[i], b = nodeArr[j];
      const dx = a.mesh.position.x - b.mesh.position.x;
      const dy = a.mesh.position.y - b.mesh.position.y;
      const dz = a.mesh.position.z - b.mesh.position.z;
      const dist2 = dx * dx + dy * dy + dz * dz + 0.1;
      const dist = Math.sqrt(dist2);
      let f = (200 / dist2) * forceScale;
      f = Math.min(f, 2.0);
      const fx = (dx / dist) * f, fy = (dy / dist) * f, fz = (dz / dist) * f;
      a.vx += fx; a.vy += fy; a.vz += fz;
      b.vx -= fx; b.vy -= fy; b.vz -= fz;
    }
  }

  // Spring attraction
  edges.forEach(e => {
    const a = nodes[e.srcId], b = nodes[e.tgtId];
    const dx = b.mesh.position.x - a.mesh.position.x;
    const dy = b.mesh.position.y - a.mesh.position.y;
    const dz = b.mesh.position.z - a.mesh.position.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz + 0.1);
    const f = 0.01 * (dist - e.restLength) * forceScale;
    const fx = (dx / dist) * f, fy = (dy / dist) * f, fz = (dz / dist) * f;
    a.vx += fx; a.vy += fy; a.vz += fz;
    b.vx -= fx; b.vy -= fy; b.vz -= fz;
  });

  // Level clustering
  nodeArr.forEach(nd => {
    const p = nd.mesh.position;
    if (nd.level === 1) {
      const f = 0.005 * forceScale;
      nd.vx -= p.x * f; nd.vy -= p.y * f; nd.vz -= p.z * f;
    } else {
      const dist = Math.sqrt(p.x * p.x + p.z * p.z) || 0.1;
      const f = 0.003 * (dist - 25) * forceScale;
      nd.vx -= (p.x / dist) * f;
      nd.vz -= (p.z / dist) * f;
    }
  });

  // Category clustering: tools toward tool_router
  const tr = nodes.tool_router;
  ['tool_search','tool_code','tool_api','tool_file'].forEach(tid => {
    const t = nodes[tid];
    const dx = tr.mesh.position.x - t.mesh.position.x;
    const dy = tr.mesh.position.y - t.mesh.position.y;
    const dz = tr.mesh.position.z - t.mesh.position.z;
    const f = 0.01 * forceScale;
    t.vx += dx * f; t.vy += dy * f; t.vz += dz * f;
  });

  // Memory clustering
  const ms = nodes.memory_short, ml = nodes.memory_long;
  const mdx = ml.mesh.position.x - ms.mesh.position.x;
  const mdy = ml.mesh.position.y - ms.mesh.position.y;
  const mdz = ml.mesh.position.z - ms.mesh.position.z;
  const mf = 0.005 * forceScale;
  ms.vx += mdx * mf; ms.vy += mdy * mf; ms.vz += mdz * mf;
  ml.vx -= mdx * mf; ml.vy -= mdy * mf; ml.vz -= mdz * mf;

  // Centering
  nodeArr.forEach(nd => {
    const p = nd.mesh.position;
    const f = 0.001 * forceScale;
    nd.vx -= p.x * f; nd.vy -= p.y * f; nd.vz -= p.z * f;
  });

  // Apply velocity with damping and cap
  const cap = 1.5;
  nodeArr.forEach(nd => {
    nd.vx *= 0.92; nd.vy *= 0.92; nd.vz *= 0.92;
    nd.vx = Math.max(-cap, Math.min(cap, nd.vx));
    nd.vy = Math.max(-cap, Math.min(cap, nd.vy));
    nd.vz = Math.max(-cap, Math.min(cap, nd.vz));
    nd.mesh.position.x += nd.vx;
    nd.mesh.position.y += nd.vy;
    nd.mesh.position.z += nd.vz;
  });
}

// Signals
const signals = [];
let signalIdCounter = 0;

function createSignal(srcId, tgtId, scenarioPath) {
  const id = signalIdCounter++;
  const geom = new THREE.SphereGeometry(0.3, 8, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0x50c878, emissive: 0x50c878, emissiveIntensity: 1.0, transparent: true, opacity: 0.9 });
  const mesh = new THREE.Mesh(geom, mat);
  const light = new THREE.PointLight(0x50c878, 0.5, 5);
  mesh.add(light);
  scene.add(mesh);
  const sp = nodes[srcId].mesh.position;
  mesh.position.copy(sp);
  signals.push({ id, srcId, tgtId, progress: 0, speed: 0.008, mesh, waitTimer: 0, waiting: false, scenarioPath });
}

function getNextEdges(nodeId, scenarioPath) {
  const result = [];
  for (const [s, t] of scenarioPath) {
    if (s === nodeId) result.push([s, t]);
  }
  return result;
}

function updateSignals(dt) {
  for (let i = signals.length - 1; i >= 0; i--) {
    const sig = signals[i];
    if (sig.waiting) {
      sig.waitTimer -= dt;
      if (sig.waitTimer <= 0) {
        sig.waiting = false;
        // Reset node to idle
        setNodeState(sig.tgtId, 'idle');
        // Spawn next signals
        const nextEdges = getNextEdges(sig.tgtId, sig.scenarioPath);
        // Remove this edge from scenario to prevent re-traversal
        const edgeIdx = sig.scenarioPath.findIndex(e => e[0] === sig.srcId && e[1] === sig.tgtId);
        if (edgeIdx >= 0) sig.scenarioPath.splice(edgeIdx, 1);
        nextEdges.forEach(([s, t]) => {
          const remaining = sig.scenarioPath.filter(e => !(e[0] === s && e[1] === t));
          createSignal(s, t, [...sig.scenarioPath]);
        });
        scene.remove(sig.mesh);
        signals.splice(i, 1);
      }
      continue;
    }
    sig.progress += sig.speed;
    // Highlight edge
    const edge = edges.find(e => e.srcId === sig.srcId && e.tgtId === sig.tgtId);
    if (edge) {
      edge.mat.color.lerp(new THREE.Color(0x50c878), 0.1);
      edge.arrowMat.color.lerp(new THREE.Color(0x50c878), 0.1);
    }
    const sp = nodes[sig.srcId].mesh.position;
    const tp = nodes[sig.tgtId].mesh.position;
    sig.mesh.position.lerpVectors(sp, tp, Math.min(sig.progress, 1));

    if (sig.progress >= 1) {
      // Arrived at target
      setNodeState(sig.tgtId, 'active');
      sig.waiting = true;
      sig.waitTimer = nodes[sig.tgtId].latency;
      // Restore edge color
      if (edge) {
        edge.mat.color.set(0x333333);
        edge.arrowMat.color.set(0x555555);
      }
    }
  }
}

function setNodeState(nodeId, state) {
  const node = nodes[nodeId];
  if (!node) return;
  node.state = state;
  const c = STATE_COLORS[state];
  node.material.color.set(c);
  node.material.emissive.set(c);
  node.material.emissiveIntensity = state === 'active' ? 0.8 : 0.3;
}

function launchScenario(name) {
  // Clear existing signals
  signals.forEach(s => scene.remove(s.mesh));
  signals.length = 0;
  // Reset all nodes
  Object.values(nodes).forEach(n => setNodeState(n.id, 'idle'));
  const path = SCENARIOS[name].map(e => [...e]);
  setNodeState('prompt_input', 'active');
  setTimeout(() => {
    setNodeState('prompt_input', 'idle');
    createSignal(path[0][0], path[0][1], path);
  }, nodes.prompt_input.latency);
}

// UI events
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => launchScenario(btn.dataset.scenario));
});
document.getElementById('send-btn').addEventListener('click', () => launchScenario('simple'));

// Info panel
const infoPanel = document.getElementById('info-panel');
document.getElementById('panel-close').addEventListener('click', () => infoPanel.classList.remove('open'));

let selectedNodeId = null;

function showInfoPanel(nodeId) {
  const n = nodes[nodeId];
  if (!n) return;
  selectedNodeId = nodeId;
  document.getElementById('panel-title').textContent = n.label;
  document.getElementById('panel-role').textContent = n.role;
  document.getElementById('panel-state').textContent = n.state;
  document.getElementById('panel-latency').textContent = n.latency + 'ms';
  document.getElementById('panel-incoming').textContent = incoming[nodeId].map(id => nodes[id].label).join(', ') || 'None';
  document.getElementById('panel-outgoing').textContent = outgoing[nodeId].map(id => nodes[id].label).join(', ') || 'None';
  infoPanel.classList.add('open');
}

// Raycaster for hover/click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hoveredNodeId = null;

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY + 12) + 'px';
});

function updateHover() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  if (hoveredNodeId) {
    const prev = nodes[hoveredNodeId];
    if (prev && prev.state === 'idle') {
      prev.material.emissiveIntensity = 0.3;
    }
    edges.forEach(e => {
      if (e.srcId === hoveredNodeId || e.tgtId === hoveredNodeId) {
        e.mat.color.set(0x333333);
      }
    });
    hoveredNodeId = null;
    tooltip.style.display = 'none';
  }
  if (intersects.length > 0) {
    const nid = intersects[0].object.userData.nodeId;
    if (nid && nodes[nid]) {
      hoveredNodeId = nid;
      nodes[nid].material.emissiveIntensity = 0.6;
      edges.forEach(e => {
        if (e.srcId === nid || e.tgtId === nid) e.mat.color.set(0x6ab0ff);
      });
      tooltip.textContent = nodes[nid].label;
      tooltip.style.display = 'block';
    }
  }
}

renderer.domElement.addEventListener('click', () => {
  if (hoveredNodeId) showInfoPanel(hoveredNodeId);
});

// Camera fly-to on double-click
let flyTarget = null, flyStart = null, flyFrame = 0, flyActive = false;
renderer.domElement.addEventListener('dblclick', () => {
  if (hoveredNodeId) {
    const np = nodes[hoveredNodeId].mesh.position.clone();
    const dir = camera.position.clone().sub(np).normalize().multiplyScalar(15);
    flyTarget = { lookAt: np, camPos: np.clone().add(dir) };
    flyStart = { lookAt: controls.target.clone(), camPos: camera.position.clone() };
    flyFrame = 0;
    flyActive = true;
  }
});

function updateFlyTo() {
  if (!flyActive) return;
  flyFrame++;
  const t = Math.min(flyFrame / 60, 1);
  const ease = t * t * (3 - 2 * t); // smoothstep
  camera.position.lerpVectors(flyStart.camPos, flyTarget.camPos, ease);
  controls.target.lerpVectors(flyStart.lookAt, flyTarget.lookAt, ease);
  if (t >= 1) flyActive = false;
}

// Breathing animation
function updateBreathing(time) {
  Object.values(nodes).forEach((nd, i) => {
    if (nd.state === 'idle') {
      const s = nd.baseScale * (1 + 0.03 * Math.sin(time * 2 + i));
      nd.mesh.scale.setScalar(s);
    }
  });
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta() * 1000;
  const time = clock.getElapsedTime();

  runForces();
  updateEdgePositions();
  updateSignals(dt);
  updateBreathing(time);
  updateHover();
  updateFlyTo();
  controls.update();

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();
</script>
