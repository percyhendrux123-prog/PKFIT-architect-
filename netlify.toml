[build]
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

[functions]
  node_bundler = "esbuild"
  # All functions that load prompts at runtime need the prompt files shipped
  # alongside the bundle. Listing the glob at the top level keeps this in
  # sync if a new function adds loadPrompt() — it just works.
  included_files = ["netlify/functions/_prompts/**"]

[functions."generate-workout"]
  included_files = ["netlify/functions/_prompts/**"]

[functions."generate-meal-plan"]
  included_files = ["netlify/functions/_prompts/**"]

[functions."generate-weekly-review"]
  included_files = ["netlify/functions/_prompts/**"]

[functions."client-assistant"]
  included_files = ["netlify/functions/_prompts/**"]


[functions."axiom-overseer"]
  # Daily editor's morning brief. 13:00 UTC = 08:00 CT during CDT.
  # During CST (winter), this lands at 07:00 CT. If a strict 08:00-CT-year-round
  # is required, switch the schedule by season or move to a Cowork-loop runner.
  schedule = "0 13 * * *"

[functions."migration-recovery"]
  # Daily migration drop-off recovery. 14:00 UTC = 09:00 CT during CDT —
  # offset from axiom-overseer so the two functions don't burst the GitHub
  # / Resend rate budgets in the same minute.
  schedule = "0 14 * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self 'https://js.stripe.com')"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://api.anthropic.com; frame-src https://js.stripe.com https://hooks.stripe.com https://www.youtube-nocookie.com https://www.youtube.com; base-uri 'self'; form-action 'self' https://checkout.stripe.com"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
